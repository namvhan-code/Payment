<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinkjulieland Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background: linear-gradient(135deg, #fff9fb 0%, #fcecf2 100%); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 1); box-shadow: 0 20px 50px -10px rgba(244, 114, 182, 0.15); }
        .virtual-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .virtual-card:hover { transform: translateY(-4px); }
        .virtual-card:active { transform: translateY(2px) scale(0.98); }
        ::-webkit-scrollbar { width: 0px; }
    </style>
    <script>
        tailwind.config = { theme: { extend: { colors: { pink: { 400: '#ff85b3', 500: '#ff66a0' } } } } }
    </script>
</head>
<body class="flex flex-col items-center py-6 px-4 text-brown-600">

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 bg-pink-500 text-white px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 translate-y-4 z-50 font-medium">
        คัดลอกเลขบัญชีแล้ว
    </div>

    <div class="max-w-[420px] w-full space-y-5">
        <div class="text-center pt-2">
            <h1 class="text-2xl font-bold text-pink-500">Pinkjulieland</h1>
            <p class="text-sm text-brown-400">Payment & Checkout</p>
        </div>

        <div class="glass-card rounded-[40px] p-4">
            <div class="p-4 space-y-5">
                <div class="text-center">
                    <p class="text-[15px] font-medium text-gray-700">ชื่อบัญชี <span class="text-pink-500 font-bold bg-pink-50 px-2 py-0.5 rounded-lg border border-pink-100">วรนันท์ พชรมิธิกรกุล</span></p>
                </div>

                <!-- ธนาคารกรุงไทย (สีฟ้า) -->
                <div class="virtual-card bg-gradient-to-br from-blue-500 to-blue-600 rounded-[24px] p-5 shadow-lg shadow-blue-500/20 cursor-pointer border border-blue-400/30" onclick="copyText('5080401028')">
                    <div class="flex justify-between items-center text-white">
                        <span class="font-bold">Krungthai Bank</span>
                        <span class="text-[12px] bg-white/20 px-3 py-1 rounded-full">คัดลอก</span>
                    </div>
                    <div class="text-white font-bold text-[22px] tracking-widest mt-3">5080401028</div>
                </div>

                <!-- วอลเล็ต (สีชมพู) -->
                <div class="virtual-card bg-gradient-to-br from-pink-400 to-pink-500 rounded-[24px] p-5 shadow-lg shadow-pink-500/20 cursor-pointer border border-pink-300/30" onclick="copyText('0968302162')">
                    <div class="flex justify-between items-center text-white">
                        <span class="font-bold">TrueMoney Wallet</span>
                        <span class="text-[12px] bg-white/20 px-3 py-1 rounded-full">คัดลอก</span>
                    </div>
                    <div class="text-white font-bold text-[22px] tracking-widest mt-3">0968302162</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.remove('opacity-0', 'translate-y-4');
                toast.classList.add('opacity-100', 'translate-y-0');
                setTimeout(() => {
                    toast.classList.remove('opacity-100', 'translate-y-0');
                    toast.classList.add('opacity-0', 'translate-y-4');
                }, 2000);
            });
        }
    </script>
</body>
</html>
